<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shy Order</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</head>
<body>

  <!-- ── Top bar: language switcher + user info ─────────────── -->
  <div class="top-bar">
    <button class="lang-btn" data-lang="it">IT</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" data-lang="en">EN</button>
    <span class="lang-sep">·</span>
    <button class="lang-btn" data-lang="es">ES</button>
    <span id="user-sep" class="lang-sep hidden">·</span>
    <span id="user-name" class="user-name hidden"></span>
    <span id="logout-sep" class="lang-sep hidden">·</span>
    <button id="logout-btn" class="logout-btn hidden"></button>
  </div>

  <div id="logo" class="logo">Shy Order</div>
  <div id="greeting" class="greeting hidden"></div>
  <div id="tagline" class="tagline"></div>

  <!-- ── Auth screen ─────────────────────────────────────────── -->
  <div id="screen-auth" class="screen hidden">
    <a href="https://shy-order-production.up.railway.app/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332Z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
      </svg>
      <span id="google-btn-text"></span>
    </a>
    <p id="auth-error" class="form-error"></p>
  </div>

  <!-- ── Payment setup screen ───────────────────────────────── -->
  <div id="screen-payment" class="screen hidden">
    <p id="payment-title" class="section-title"></p>
    <p id="payment-sub" class="section-sub"></p>
    <div id="card-element" class="card-element"></div>
    <button id="save-card-btn" class="primary-btn"></button>
    <p id="payment-error" class="form-error"></p>
  </div>

  <!-- ── Main screen ────────────────────────────────────────── -->
  <div id="screen-main" class="screen hidden">
    <div class="scrape-section">
      <div class="scrape-row">
        <input
          type="url"
          id="restaurant-url"
          class="scrape-input"
        />
        <button id="scrape-btn" class="scrape-btn"></button>
      </div>
      <div id="scrape-result" class="scrape-result"></div>
    </div>

    <p id="no-data-hint" class="no-data-hint"></p>

    <elevenlabs-convai
      agent-id="agent_9901kjyr4vwpeyyr2rc3e37qkncs"
      avatar-orb-color-1="#1a1a1a"
      avatar-orb-color-2="#444444"
      mic-muting="true"
      transcript="true"
    ></elevenlabs-convai>
  </div>

  <script type="module">
    // ── Translations ───────────────────────────────────────────────────────────
    const LANGS = {
      it: {
        langName:       'italiano',
        tagline:        'essere timidi ha il suo fascino',
        greeting:       (name) => `ciao ${name}, prenota un tavolo o ordina cibo senza chiamare davvero`,
        actionText:     'Parla con Shy Order',
        startCallText:  'Inizia la chiamata',
        endCallText:    'Termina la chiamata',
        listeningText:  'In ascolto…',
        speakingText:   'Sto parlando…',
        googleBtn:      'Continua con Google',
        paymentTitle:   'Aggiungi una carta',
        paymentSub:     'Ti verrà addebitato €0,15/min + €0,20 a conversazione.',
        saveCard:       'Salva carta',
        scrapeInput:    'incolla il link del ristorante (es. TheFork, Tripadvisor, sito ufficiale)',
        scrapeBtn:      'Cerca',
        noDataHint:     '💡 Suggerimento: prima di iniziare, tieni a portata di mano il numero di telefono e l\'indirizzo del ristorante.',
        logout:         'Esci',
        authError:      'Errore durante il login con Google.',
        scrapeFail:     'Nessun dato trovato.',
      },
      en: {
        langName:       'english',
        tagline:        'being shy has its charm',
        greeting:       (name) => `hey ${name}, book a table or order food without actually calling`,
        actionText:     'Talk to Shy Order',
        startCallText:  'Start call',
        endCallText:    'End call',
        listeningText:  'Listening…',
        speakingText:   'Speaking…',
        googleBtn:      'Continue with Google',
        paymentTitle:   'Add a card',
        paymentSub:     'You\'ll be charged €0.15/min + €0.20 per conversation.',
        saveCard:       'Save card',
        scrapeInput:    'paste the restaurant link here (e.g. TheFork, Tripadvisor, official website)',
        scrapeBtn:      'Search',
        noDataHint:     '💡 Tip: before starting, have the restaurant\'s phone number and address handy.',
        logout:         'Logout',
        authError:      'Error during Google login.',
        scrapeFail:     'No data found.',
      },
      es: {
        langName:       'español',
        tagline:        'ser tímido tiene su encanto',
        greeting:       (name) => `hola ${name}, reserva una mesa o pide comida sin llamar de verdad`,
        actionText:     'Habla con Shy Order',
        startCallText:  'Iniciar llamada',
        endCallText:    'Finalizar llamada',
        listeningText:  'Escuchando…',
        speakingText:   'Hablando…',
        googleBtn:      'Continuar con Google',
        paymentTitle:   'Añade una tarjeta',
        paymentSub:     'Se te cobrará €0,15/min + €0,20 por conversación.',
        saveCard:       'Guardar tarjeta',
        scrapeInput:    'pega aquí el enlace del restaurante (p. ej. TheFork, Tripadvisor, web oficial)',
        scrapeBtn:      'Buscar',
        noDataHint:     '💡 Sugerencia: antes de empezar, ten a mano el número de teléfono y la dirección del restaurante.',
        logout:         'Salir',
        authError:      'Error durante el inicio de sesión con Google.',
        scrapeFail:     'No se encontraron datos.',
      },
    };

    // ── State ──────────────────────────────────────────────────────────────────
    let token          = localStorage.getItem('sb_token');
    let stripeObj      = null;
    let cardElement    = null;
    let restaurantData = {};
    let currentLang    = localStorage.getItem('lang') || 'it';
    let displayName    = '';

    // ── JWT decode (client-side, no library) ───────────────────────────────────
    function parseJwt(t) {
      try {
        return JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      } catch (_) { return {}; }
    }

    function displayNameFromToken(t) {
      const p = parseJwt(t);
      return p?.user_metadata?.full_name
          || p?.user_metadata?.name
          || p?.email
          || '';
    }

    // ── Language ───────────────────────────────────────────────────────────────
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      const t = LANGS[lang];

      document.documentElement.lang = lang;
      document.getElementById('tagline').textContent         = t.tagline;
      if (displayName) document.getElementById('greeting').textContent = t.greeting(displayName);
      document.getElementById('google-btn-text').textContent = t.googleBtn;
      document.getElementById('payment-title').textContent   = t.paymentTitle;
      document.getElementById('payment-sub').textContent     = t.paymentSub;
      document.getElementById('save-card-btn').textContent   = t.saveCard;
      document.getElementById('restaurant-url').placeholder  = t.scrapeInput;
      document.getElementById('no-data-hint').textContent     = t.noDataHint;
      document.getElementById('logout-btn').textContent       = t.logout;

      const scrapeBtn = document.getElementById('scrape-btn');
      if (!scrapeBtn.disabled) scrapeBtn.textContent = t.scrapeBtn;

      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });

      updateWidgetAttrs();
    }

    function updateWidgetAttrs() {
      const widget = document.querySelector('elevenlabs-convai');
      if (!widget) return;
      const t = LANGS[currentLang];
      widget.setAttribute('dynamic-variables', JSON.stringify({
        user_language:      t.langName,
        call_language_note: 'The actual phone call to the restaurant must always be made in Italian, regardless of the language being used with the user.',
      }));
      widget.setAttribute('action-text',     t.actionText);
      widget.setAttribute('start-call-text', t.startCallText);
      widget.setAttribute('end-call-text',   t.endCallText);
      widget.setAttribute('listening-text',  t.listeningText);
      widget.setAttribute('speaking-text',   t.speakingText);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    // ── Auth state helpers ─────────────────────────────────────────────────────
    function setLoggedIn(name) {
      displayName = name;
      document.getElementById('logo').classList.add('hidden');
      document.getElementById('tagline').classList.add('hidden');
      document.getElementById('greeting').textContent = LANGS[currentLang].greeting(name);
      document.getElementById('greeting').classList.remove('hidden');
      document.getElementById('user-name').textContent = name;
      ['user-sep', 'user-name', 'logout-sep', 'logout-btn'].forEach(id => {
        document.getElementById(id).classList.remove('hidden');
      });
    }

    function setLoggedOut() {
      displayName = '';
      document.getElementById('logo').classList.remove('hidden');
      document.getElementById('tagline').classList.remove('hidden');
      document.getElementById('greeting').classList.add('hidden');
      ['user-sep', 'user-name', 'logout-sep', 'logout-btn'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
    }

    // ── Screens ────────────────────────────────────────────────────────────────
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${name}`).classList.remove('hidden');
    }

    // ── API helper ─────────────────────────────────────────────────────────────
    const BASE = 'https://shy-order-production.up.railway.app';

    function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return fetch(BASE + path, { ...opts, headers });
    }

    // ── Stripe / payment setup ─────────────────────────────────────────────────
    async function initStripe() {
      if (stripeObj) return;
      const { stripe_publishable_key } = await api('/config').then(r => r.json());
      stripeObj = Stripe(stripe_publishable_key);
      const elements = stripeObj.elements({ appearance: { theme: 'night' } });
      cardElement = elements.create('card', {
        style: { base: { color: '#f0f0f0', fontFamily: 'Georgia, serif', fontSize: '14px', '::placeholder': { color: '#555' } } },
      });
      cardElement.mount('#card-element');
    }

    document.getElementById('save-card-btn').addEventListener('click', async () => {
      const btn   = document.getElementById('save-card-btn');
      const errEl = document.getElementById('payment-error');
      btn.disabled = true;
      errEl.textContent = '';

      try {
        const res = await api('/payment/setup', { method: 'POST' });
        const { client_secret } = await res.json();
        if (!res.ok) throw new Error(client_secret || 'Errore');

        const result = await stripeObj.confirmCardSetup(client_secret, {
          payment_method: { card: cardElement },
        });
        if (result.error) throw new Error(result.error.message);

        showScreen('main');
      } catch (err) {
        errEl.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });

    // ── Scrape ─────────────────────────────────────────────────────────────────
    document.getElementById('scrape-btn').addEventListener('click', async () => {
      const url    = document.getElementById('restaurant-url').value.trim();
      const btn    = document.getElementById('scrape-btn');
      const result = document.getElementById('scrape-result');
      if (!url) return;

      btn.disabled = true;
      btn.textContent = '…';
      result.textContent = '';
      result.className = 'scrape-result';

      try {
        const res = await api('/scrape', { method: 'POST', body: JSON.stringify({ url }) });
        if (!res.ok) throw new Error(await res.text());
        restaurantData = await res.json();
        const parts = [restaurantData.name, restaurantData.phone_number, restaurantData.address, restaurantData.hours].filter(Boolean);
        result.textContent = parts.length ? parts.join(' · ') : LANGS[currentLang].scrapeFail;
        result.classList.add(parts.length ? 'found' : 'empty');
        document.getElementById('no-data-hint').hidden = parts.length > 0;
      } catch (err) {
        result.textContent = 'Errore: ' + err.message;
        result.classList.add('error');
      } finally {
        btn.disabled = false;
        btn.textContent = LANGS[currentLang].scrapeBtn;
      }
    });

    // ── Logout ─────────────────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('sb_token');
      token = null;
      setLoggedOut();
      showScreen('auth');
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    async function init() {
      setLanguage(currentLang);

      const hash = new URLSearchParams(window.location.hash.slice(1));
      const hashToken = hash.get('access_token');

      if (hashToken) {
        window.history.replaceState({}, '', '/');
        try {
          const res = await api('/auth/google-complete', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${hashToken}` },
          });
          const d = await res.json();
          token = hashToken;
          localStorage.setItem('sb_token', token);
          setLoggedIn(displayNameFromToken(token));
          if (d.has_payment_method) { showScreen('main'); }
          else { await initStripe(); showScreen('payment'); }
        } catch (_) {
          document.getElementById('auth-error').textContent = LANGS[currentLang].authError;
          showScreen('auth');
        }
        return;
      }

      if (!token) { showScreen('auth'); return; }

      try {
        const res = await api('/payment/status');
        if (res.status === 401) { localStorage.removeItem('sb_token'); token = null; showScreen('auth'); return; }
        const { has_payment_method } = await res.json();
        setLoggedIn(displayNameFromToken(token));
        if (!has_payment_method) { await initStripe(); showScreen('payment'); }
        else showScreen('main');
      } catch (_) {
        showScreen('auth');
      }
    }

    init();
  </script>

</body>
</html>
